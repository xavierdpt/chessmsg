<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>chessmsg mockup</title>
<style>
  :root {
    --cell: min(12.5vw, 56px);
    --light: #f0d9b5;
    --dark:  #b58863;
    --arrow: rgba(102, 41, 102, 0.55);
    --accent: #6a696a;
    --bg: #fafafa;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: #222;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: contain;
  }
  body {
    display: flex; flex-direction: column;
    height: 100dvh; height: 100vh;
  }
  #board-wrap {
    position: relative;
    margin: 8px auto;
    padding: 0;
    width: calc(var(--cell) * 8);
    height: calc(var(--cell) * 8);
    background: var(--dark);
    user-select: none;
    touch-action: none;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(8, var(--cell));
    grid-template-rows:    repeat(8, var(--cell));
    width: 100%; height: 100%;
  }
  .sq { position: relative; }
  .light { background: var(--light); }
  .dark  { background: var(--dark);  }
  .sq .p {
    position: absolute;
    inset: 0;
    display: grid; place-items: center;
    pointer-events: none;
  }
  .sq .p img {
    width: 92%;
    height: 92%;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  #arrows {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  #arrows path { fill: var(--arrow); }
  #moves-wrap {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    border-top: 1px solid #e5e5e5;
    border-bottom: 1px solid #e5e5e5;
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
  }
  #moves { display: block; }
  .row {
    display: flex;
    font-size: 15px;
    border-bottom: 1px solid rgba(46, 125, 50, 0.30);
  }
  .row:last-child { border-bottom: none; }
  .row > div {
    padding: 4px 8px;
    display: flex;
    align-items: center;
  }
  .row .left  { flex: 3; text-align: left; }
  .row .right { flex: 1; background: rgba(76, 175, 80, 0.12); }
  .row.left-clicked .left  { background: rgba(76, 175, 80, 0.30); }
  .row.right-clicked .right { background: rgba(46, 125, 50, 0.55); }
  .row .san   { font-weight: 600; }
  .row .score { color: #888; font-size: 13px; margin-left: 6px; white-space: nowrap; flex-shrink: 0; }
  .row .san     { flex-shrink: 0; }
  .row .score-bar {
    position: relative;
    flex: 0 0 auto;
    align-self: stretch;
    margin-left: auto;
    background: white;
    border: 1px solid #ccc;
  }
  .row .score-bar-fill {
    display: block;
    position: absolute;
    top: 0; bottom: 0; left: 0;
    background: black;
  }
  .row .score-cells {
    display: inline-flex;
    gap: 2px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .row .score-cell {
    display: inline-block;
    width: 8px; height: 12px;
    background: #888;
  }
  .row .score-cells.good .score-cell { background: rgba(102, 41, 102, 0.7); }
  .row .score-cells.bad  .score-cell { background: rgba(220, 20, 60, 0.7); }
  #share {
    width: 100%;
    padding: 12px 16px;
    font-size: 16px; font-weight: 600;
    border: none; border-radius: 0;
    background: var(--accent); color: #fff;
    cursor: pointer;
    flex: 0 0 auto;
  }
  #share[disabled] { background: #999; }
  @media (max-width: 360px) {
    :root { --cell: 11.5vw; }
    .row { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="board-wrap">
  <div id="board" role="grid" aria-label="chess board"></div>
  <svg id="arrows" preserveAspectRatio="none"></svg>
</div>
<div id="moves-wrap">
  <div id="moves" role="list"></div>
</div>
<button id="share" disabled>Share</button>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.12.0/chess.min.js" defer></script>
<script src="script.js" defer></script>
</body>
</html>
